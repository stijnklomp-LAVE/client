x-acceptance: &acceptance
  image: oven/bun:alpine
  volumes:
    - .:/src
  working_dir: /src
  tty: true
  environment:
    RABBIT_HOST: rabbitmq
    DATABASE_URL: "postgresql://dev:admin123@db:5432/video-editor?schema=public"
  env_file:
    - path: .env.development
  ports:
    - 3001:3001

x-app: &app
  tty: true
  environment:
    RABBIT_HOST: rabbitmq
    DATABASE_URL: "postgresql://dev:admin123@db:5432/video-editor?schema=public"
  env_file:
    - path: .env.development
  ports:
    - ${API_PORT:-3000}:3000

services:
  local:
    <<: *app
    build:
      context: .
    profiles:
      - local
      - test

  dev:
    <<: *app
    image: oven/bun:alpine
    volumes:
      - .:/src
    working_dir: /src
    command: |
      sh -c "
        if [ ! -d node_modules ]; then
          bun install --frozen-lockfile --ignore-scripts
        fi
        bun run dev
      "
    profiles:
      - dev

  shared:
    <<: *app
    image: oven/bun:alpine
    volumes:
      - .:/src
    working_dir: /src
    networks:
      - platform
    command: |
      sh -c "
        if [ ! -d node_modules ]; then
          bun install --frozen-lockfile --ignore-scripts
        fi
        bun run dev
      "
    profiles:
      - shared

  test:
    image: oven/bun:alpine
    volumes:
      - .:/src
    working_dir: /src
    command: sh -c "bun install --frozen-lockfile --ignore-scripts --no-optional 2>/dev/null; bun run test"
    profiles:
      - test

  test-coverage:
    image: oven/bun:alpine
    volumes:
      - .:/src
    working_dir: /src
    command: sh -c "bun install --frozen-lockfile --ignore-scripts --no-optional 2>/dev/null; bun run test:coverage"
    profiles:
      - test

  e2e:
    image: mcr.microsoft.com/playwright:v1.60.0
    volumes:
      - .:/src
    working_dir: /src
    command: sh -c "bun install --frozen-lockfile --ignore-scripts --no-optional 2>/dev/null; bun run test:e2e"
    depends_on:
      - dev
    profiles:
      - test

  acceptance:
    <<: *acceptance
    command: |
      sh -c "
        if [ ! -d node_modules ]; then
          bun install --frozen-lockfile --ignore-scripts
        fi
        sleep infinity
      "
    profiles:
      - local
      - dev

  acceptance-once:
    <<: *acceptance
    command: |
      sh -c "
        if [ ! -d node_modules ]; then
          bun install --frozen-lockfile --ignore-scripts
        fi
        bun run test:acceptance
      "
    profiles:
      - test

networks:
  platform:
    external: true
    name: platform
